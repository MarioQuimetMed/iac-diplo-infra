# Compose de producción local: stack completo dockerizado.
# Construye las imágenes de orders/notifications y las corre junto a
# NATS y Redis. Sirve para validar los Dockerfiles antes de subir a ECR.
services:
  nats:
    image: nats:2.10-alpine
    container_name: nats-broker
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-orders_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  orders:
    build:
      context: .
      dockerfile: apps/orders/Dockerfile
    container_name: orders
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      ORDERS_HTTP_PORT: "3000"
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-orders_db}
      DB_SYNC: ${DB_SYNC:-false}
    ports:
      - "3000:3000"
    depends_on:
      - nats
      - redis
      - postgres

  notifications:
    build:
      context: .
      dockerfile: apps/notifications/Dockerfile
    container_name: notifications
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats

volumes:
  redis_data:
  postgres_data:
